<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZUMAHEI PRO - Super Admin Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #00d2ff; --secondary: #bc13fe; --accent: #ffd700; --danger: #ff4757; --bg: #020205; --glass: rgba(255, 255, 255, 0.08); --sakura: #ffb7c5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #sakura-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .petal { position: absolute; background: var(--sakura); border-radius: 150px 0 150px 150px; opacity: 0.7; }
        .hud { display: none; width: 95%; margin-top: 20px; justify-content: space-between; align-items: center; z-index: 100; padding: 15px; background: var(--glass); backdrop-filter: blur(15px); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .badge { border: 1.5px solid var(--primary); padding: 6px 15px; border-radius: 50px; font-weight: 900; font-size: 13px; }
        .wrapper { width: 92%; max-width: 450px; margin-top: 30px; z-index: 100; position: relative; }
        .screen { display: none; flex-direction: column; text-align: center; }
        .screen.active { display: flex; animation: vIn 0.4s ease; }
        @keyframes vIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn { background: var(--glass); border: 2px solid var(--primary); color: white; padding: 16px; margin: 8px 0; border-radius: 20px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); background: var(--primary); color: #000; }
        .glass { background: var(--glass); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #333; }
        .dots-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 0 10px; }
        .admin-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; background: #111; border: 2px solid var(--primary); border-radius: 25px; padding: 20px; z-index: 1000; display: none; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        .mute-msg { position: fixed; top:0; left:0; width:100%; height:100%; background: black; color: red; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .back-btn { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 5px 15px; border-radius: 10px; font-size: 12px; cursor: pointer; align-self: flex-start; margin-bottom: 10px; }
        .boost-badge { border-color: #ff9f43 !important; color: #ff9f43; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { box-shadow: 0 0 5px rgba(255,159,67,0.2); } to { box-shadow: 0 0 15px rgba(255,159,67,0.6); } }
    </style>
</head>
<body>
    <audio id="bg-music" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <div id="sakura-canvas"></div>
    <div class="mute-msg" id="mute-screen"><h1>Siz Mute qilingansiz! 🚫</h1><p id="mute-time-msg"></p></div>
    <div class="overlay" id="overlay" onclick="closeAdmin()"></div>
    
    <div class="admin-modal" id="admin-modal">
        <h3 id="adm-target-name" style="color:var(--primary)">User Name</h3>
        <button class="btn" style="width:100%; font-size:12px;" onclick="e.admInfo()">1. Ma'lumot Olish 📊</button>
        <button class="btn" style="width:100%; font-size:12px;" onclick="e.admZePrompt()">2. ŽÉ Tashlash 💸</button>
        <button class="btn" style="width:100%; font-size:12px; border-color:var(--danger); color:var(--danger);" onclick="e.admMutePrompt()">3. Mute Berish 🔇</button>
        <button class="btn" style="width:100%; border:none; color:grey" onclick="closeAdmin()">Yopish</button>
    </div>

    <div class="hud" id="hud">
        <div id="ui-hearts">❤️❤️❤️</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
            <div id="ui-boost" class="badge boost-badge" style="display:none;">🔥 <span id="b-time">00:00</span></div>
            <div class="badge">ŽÉ: <span id="z-val">0</span></div>
            <div class="badge" style="border-color:var(--accent)">XP: <span id="x-val">0</span></div>
        </div>
    </div>

    <div class="wrapper">
        <div id="s-auth" class="screen">
            <h1>ZUMAHEI PRO</h1>
            <input type="text" id="i-name" style="background:rgba(255,255,255,0.05); border:2px solid var(--primary); padding:15px; border-radius:15px; color:white; width:100%; text-align:center; margin-bottom:15px;" placeholder="Ismingiz...">
            <button class="btn" style="width:100%" onclick="e.login()">KIRISH</button>
        </div>

        <div id="s-lobby" class="screen">
            <button class="btn" onclick="e.start()">Ingliz tilidan test</button>
            <button class="btn" onclick="e.nav('s-market')">Market</button>
            <button class="btn" onclick="e.stats()">Reyting 🏆</button>
            <button class="btn" style="border-color:var(--secondary);color:var(--secondary)" onclick="e.prof()">Profil 👤</button>
            <div style="margin-top:20px; font-weight:900; background:linear-gradient(90deg, #bc13fe, #00d2ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">DEVELOPER: IBROHIMOV JO'RABEK</div>
        </div>

        <div id="s-quiz" class="screen">
            <button class="back-btn" onclick="e.nav('s-lobby')">⬅ ORQAGA</button>
            <div id="q-c" style="color:var(--accent);margin-bottom:10px;">Savol: 1/50</div>
            <div class="glass"><h2 id="q-w" style="font-size:40px">--</h2><input type="text" id="i-ans" style="background:rgba(255,255,255,0.05); border:2px solid var(--primary); padding:15px; border-radius:15px; color:white; width:100%; text-align:center; margin-bottom:15px;" placeholder="Javob..."><button class="btn" style="width:100%" onclick="e.check()">SUBMIT</button></div>
        </div>

        <div id="s-prof" class="screen"><div class="glass"><h3 id="p-n">--</h3><p id="p-i" style="color:var(--primary)">ID: --</p><div style="display:flex;justify-content:space-around;"><div><small>XP</small><br><b id="p-x">0</b></div><div><small>ŽÉ</small><br><b id="p-z">0</b></div></div></div><button class="btn" onclick="e.nav('s-lobby')">BACK</button></div>
        <div id="s-stats" class="screen"><h2>REYTING</h2><div class="glass" id="l-list" style="max-height:350px; overflow-y:auto; padding:5px;"></div><button class="btn" onclick="e.nav('s-lobby')">BACK</button></div>
        
        <div id="s-market" class="screen">
            <h2>MARKET</h2>
            <div class="glass">
                <button class="btn" style="width:100%" onclick="e.buy(20, 180)">20 ŽÉ = 2x XP (3 MIN)</button>
                <button class="btn" style="width:100%" onclick="e.buy(35, 300)">35 ŽÉ = 2x XP (5 MIN)</button>
                <button class="btn" style="width:100%" onclick="e.buy(50, 480)">50 ŽÉ = 2x XP (8 MIN)</button>
            </div>
            <button class="btn" onclick="e.nav('s-lobby')">BACK</button>
        </div>

        <div id="s-win" class="screen"><div class="glass"><h2>MUKAMMAL! 😁</h2><p id="f-t">00:00</p></div><button class="btn" onclick="location.reload()">RESTART</button></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue, child } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const cfg = { apiKey: "AIzaSyC-tl_-UIFBM_1sjIbxCg3kQUPiXKFACDE", authDomain: "zumahei.firebaseapp.com", projectId: "zumahei", databaseURL: "https://zumahei-default-rtdb.firebaseio.com" };
        const app = initializeApp(cfg); const db = getDatabase(app);
        const bank = [{en:"Apple",uz:"olma"},{en:"Book",uz:"kitob"},{en:"Water",uz:"suv"},{en:"Sun",uz:"quyosh"},{en:"Moon",uz:"oy"},{en:"Sky",uz:"osmon"},{en:"Friend",uz:"do'st"},{en:"School",uz:"maktab"},{en:"Car",uz:"mashina"},{en:"Time",uz:"vaqt"},{en:"Money",uz:"pul"},{en:"Work",uz:"ish"},{en:"City",uz:"shahar"},{en:"Life",uz:"hayot"},{en:"Love",uz:"sevgi"},{en:"Bread",uz:"non"},{en:"Milk",uz:"sut"},{en:"Today",uz:"bugun"},{en:"Now",uz:"hozir"},{en:"Name",uz:"ism"},{en:"Home",uz:"uy"},{en:"Family",uz:"oila"},{en:"Child",uz:"bola"},{en:"Brother",uz:"aka"},{en:"Sister",uz:"opa"},{en:"Good",uz:"yaxshi"},{en:"Bad",uz:"yomon"},{en:"Big",uz:"katta"},{en:"Small",uz:"kichik"},{en:"Hot",uz:"issiq"},{en:"Cold",uz:"sovuq"},{en:"Fast",uz:"tez"},{en:"Slow",uz:"sekin"},{en:"Tree",uz:"daraxt"},{en:"Flower",uz:"gul"},{en:"Day",uz:"kun"},{en:"Night",uz:"tun"},{en:"Red",uz:"qizil"},{en:"Blue",uz:"ko'k"},{en:"Green",uz:"yashil"},{en:"White",uz:"oq"},{en:"Black",uz:"qora"},{en:"Hand",uz:"qo'l"},{en:"Foot",uz:"oyoq"},{en:"Eye",uz:"ko'z"},{en:"Sea",uz:"dengiz"},{en:"Fire",uz:"olov"},{en:"Paper",uz:"qog'oz"},{en:"Pen",uz:"ruchka"},{en:"Door",uz:"eshik"}];

        window.e = {
            s: { n: localStorage.getItem('z_u')||"", i: "01", x: 0, z: 0, h: 3, m: 0 },
            ci: 0, st: 0, b: 0, admT: "",
            init() { 
                this.sakura(); 
                this.auth(); 
                document.getElementById('i-ans').onkeypress=(ev)=>ev.key==='Enter'&&this.check(); 
                
                // BOOST TAYMERINI HAR SONIYADA TEKSHIRISH
                setInterval(() => {
                    if(this.b > Date.now()) {
                        document.getElementById('ui-boost').style.display = 'block';
                        let sec = Math.floor((this.b - Date.now()) / 1000);
                        document.getElementById('b-time').innerText = `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
                    } else {
                        document.getElementById('ui-boost').style.display = 'none';
                    }
                }, 1000);
            },
            sakura() { const st = document.getElementById('sakura-canvas'); setInterval(() => { const p = document.createElement('div'); p.className='petal'; const sz = Math.random()*8+7; p.style.width=sz+'px'; p.style.height=sz+'px'; p.style.left=Math.random()*100+'vw'; const dur=Math.random()*5+9; p.animate([{transform:`translateY(-20px) rotate(0deg)`,opacity:0},{opacity:0.7,offset:0.1},{transform:`translateY(105vh) rotate(600deg)`,opacity:0}],{duration:dur*1000,easing:'linear'}); st.appendChild(p); setTimeout(()=>p.remove(),dur*1000); }, 350); },
            playMusic() {
                const bgm = document.getElementById('bg-music');
                bgm.volume = 0.1;
                bgm.play().catch(err => console.log("Musiqa kutilmoqda..."));
            },
            async auth() {
                if(this.s.n) {
                    const userRef = ref(db, `users/${this.s.n}`);
                    onValue(userRef, (snapshot) => {
                        if(snapshot.exists()) {
                            const data = snapshot.val();
                            this.s.ze = data.ze || 0;
                            this.s.xp = data.xp || 0;
                            this.s.id = data.id || "01";
                            this.s.m = data.m || 0;
                            if(this.s.m > Date.now()) { this.showMute(); } 
                            else { document.getElementById('mute-screen').style.display = 'none'; this.upd(); }
                        }
                    });
                    this.playMusic(); 
                    this.nav('s-lobby');
                } else this.nav('s-auth');
            },
            async login() {
                const n = document.getElementById('i-name').value.trim(); if(!n) return;
                const sn = await get(child(ref(db), `users/${n}`));
                if(sn.exists()) { localStorage.setItem('z_u', n); this.auth(); }
                else {
                    const c = await get(child(ref(db), 'stats/totalUsers')); const id = (c.val() || 0) + 1; const fid = "PRO-"+id.toString().padStart(4, '0');
                    const newUser = { name: n, id: fid, xp: 0, ze: 0, m: 0 };
                    await set(ref(db, `users/${n}`), newUser); await set(ref(db, 'stats/totalUsers'), id);
                    this.s = newUser; localStorage.setItem('z_u', n); this.auth();
                }
                this.playMusic(); 
            },
            showMute() {
                document.getElementById('mute-screen').style.display = 'flex';
                const left = Math.ceil((this.s.m - Date.now()) / 60000);
                document.getElementById('mute-time-msg').innerText = `Blok muddati tugashiga ${left} daqiqa qoldi.`;
            },
            nav(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('hud').style.display=(id==='s-auth')?'none':'flex'; },
            start() { this.ci=0; this.s.h=3; this.st=Date.now(); this.upd(); this.rnd(); this.nav('s-quiz'); },
            rnd() { document.getElementById('ui-hearts').innerText="❤️".repeat(this.s.h); document.getElementById('q-w').innerText=bank[this.ci].en; document.getElementById('q-c').innerText=`Savol: ${this.ci+1}/50`; document.getElementById('i-ans').value=""; document.getElementById('i-ans').focus(); },
            check() { const a=document.getElementById('i-ans').value.toLowerCase().trim(); if(a===bank[this.ci].uz) { const gain = (this.b > Date.now()) ? 50 : 25; update(ref(db, `users/${this.s.n}`), { ze: this.s.ze + 0.5, xp: this.s.xp + gain }); this.ci++; if(this.ci>=50) this.win(); else this.rnd(); } else { this.s.h--; if(this.s.h<=0) { alert("Game Over!"); this.nav('s-lobby'); } else this.rnd(); } },
            win() { confetti(); const t=Math.floor((Date.now()-this.st)/1000); document.getElementById('f-t').innerText=`${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`; this.nav('s-win'); },
            upd() { document.getElementById('z-val').innerText=this.s.ze.toFixed(1); document.getElementById('x-val').innerText=Math.floor(this.s.xp); },
            prof() { document.getElementById('p-n').innerText=this.s.n; document.getElementById('p-i').innerText="ID: "+this.s.id; document.getElementById('p-x').innerText=Math.floor(this.s.xp); document.getElementById('p-z').innerText=this.s.ze.toFixed(1); this.nav('s-prof'); },
            stats() {
                const l=document.getElementById('l-list'); l.innerHTML="Yuklanmoqda..."; this.nav('s-stats');
                onValue(ref(db, 'users'), (s) => {
                    const d=s.val(); if(!d) return;
                    const so=Object.values(d).sort((a,b)=>b.xp-a.xp);
                    l.innerHTML=so.map((u,i)=>`
                        <div class="list-item">
                            <span>#${i+1} ${u.name} - ${Math.floor(u.xp)} XP</span>
                            ${this.s.id === "PRO-0003" ? `<button class="dots-btn" onclick="openAdmin('${u.name}')">⋮</button>` : ''}
                        </div>`).join('');
                }, { onlyOnce: true });
            },
            async admInfo() { const sn = await get(child(ref(db), `users/${this.admT}`)); const data = sn.val(); alert(`ISM: ${data.name}\nID: ${data.id}\nŽÉ: ${data.ze}\nXP: ${data.xp}`); },
            async admZePrompt() {
                const amt = parseFloat(prompt(`${this.admT} ga necha ŽÉ bermoqchisiz?`)); if(isNaN(amt)) return;
                const sn = await get(child(ref(db), `users/${this.admT}`)); const newZe = (sn.val().ze || 0) + amt;
                await update(ref(db, `users/${this.admT}`), { ze: newZe }); alert("ŽÉ yuborildi!"); closeAdmin();
            },
            async admMutePrompt() {
                const hrs = parseFloat(prompt(`${this.admT} ni necha soatga mute qilmoqchisiz?`)); if(isNaN(hrs)) return;
                const muteUntil = Date.now() + (hrs * 3600000);
                await update(ref(db, `users/${this.admT}`), { m: muteUntil }); alert(`${this.admT} bloklandi!`); closeAdmin();
            },
            buy(c, sc) { 
                if(this.s.ze >= c) { 
                    update(ref(db, `users/${this.s.n}`), { ze: this.s.ze - c }); 
                    this.b = Date.now() + (sc * 1000); 
                    alert("Boost faol! Taymer ishga tushdi 🔥"); 
                    this.nav('s-lobby'); // Sotib olgach menyuga qaytadi
                } else alert("ŽÉ yetarli emas!"); 
            }
        };
        window.openAdmin = (name) => { window.e.admT = name; document.getElementById('adm-target-name').innerText = name; document.getElementById('admin-modal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; };
        window.closeAdmin = () => { document.getElementById('admin-modal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; };
        e.init();
    </script>
</body>
</html>
